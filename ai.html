<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Riddle Bomb Game</title>

<style>
body {
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    padding-top: 80px;
    overflow: hidden;

    background: linear-gradient(270deg, #ff0000, #660000, #ff0000);
    background-size: 600% 600%;
    animation: moveBG 8s ease infinite;
}

@keyframes moveBG {
    0% { background-position: 0% 50%;}
    50% { background-position: 100% 50%;}
    100% { background-position: 0% 50%;}
}

/* TIMER */
#timerBox {
    position: fixed;
    top: 15px;
    left: 15px;
    background: black;
    padding: 12px 18px;
    border-radius: 10px;
}

/* SCORE */
#scoreBox {
    position: fixed;
    top: 15px;
    right: 15px;
    background: black;
    padding: 12px 18px;
    border-radius: 10px;
}

/* BOMB */
#bombContainer {
    position: fixed;
    bottom: 20px;
    left: 20px;
}

/* FUSE */
#fuseBar {
    position: fixed;
    bottom: 70px;
    left: 120px;
    width: 300px;
    height: 14px;
    background: #222;
    border-radius: 10px;
}

#fuseFill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, red, orange, yellow);
    position: relative;
    transition: width 1s linear;
}

/* FLAME */
#flame {
    position: absolute;
    right: -10px;
    top: -6px;
    width: 18px;
    height: 18px;
    background: radial-gradient(circle, yellow, orange, red);
    border-radius: 50%;
    animation: flicker 0.2s infinite;
}

@keyframes flicker {
    0% { transform: scale(1);}
    50% { transform: scale(1.3);}
    100% { transform: scale(1);}
}

/* RIDDLE */
#riddleBox {
    background: rgba(0,0,0,0.7);
    padding: 30px;
    width: 60%;
    margin: auto;
    border-radius: 15px;
}

button.option {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 60%;
    border: none;
    border-radius: 10px;
    background: #333;
    color: white;
    cursor: pointer;
}

button.option:hover {
    background: #00ffcc;
    color: black;
}

/* GAME OVER */
#gameOver {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    top: 0;
    left: 0;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-size: 40px;
}

#restartBtn {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="timerBox">⏱ Time: <span id="time">30</span></div>
<div id="scoreBox">
Score: <span id="score">0</span> / 3 |
High: <span id="highScore">0</span>
</div>

<!-- BOMB -->
<div id="bombContainer">
<svg width="100" height="120">
<circle cx="50" cy="70" r="35" fill="#222"/>
<rect x="45" y="10" width="10" height="20" fill="#555"/>
</svg>
</div>

<!-- FUSE -->
<div id="fuseBar">
    <div id="fuseFill">
        <div id="flame"></div>
    </div>
</div>

<div id="riddleBox">
    <h2 id="riddleText"></h2>
    <div id="options"></div>
    <div id="feedback"></div>
</div>

<div id="gameOver">
    <div id="gameOverText"></div>
    <button id="restartBtn" onclick="location.reload()">Play Again</button>
</div>

<script>

// RIDDLES (no repeat system)
const originalRiddles = [
{q:"I speak without a mouth.",o:["Echo","Ghost","Mic","Radio"],a:"Echo"},
{q:"What has hands but can't clap?",o:["Clock","Robot","Tree","Zombie"],a:"Clock"},
{q:"Gets wetter the more it dries?",o:["Towel","Ocean","Soap","Rain"],a:"Towel"},
{q:"Runs but never walks?",o:["River","Car","Dog","Clock"],a:"River"},
{q:"Has a neck but no head?",o:["Bottle","Snake","Chair","Shirt"],a:"Bottle"},
{q:"What has one eye?",o:["Needle","Storm","Alien","Cyclops"],a:"Needle"},
{q:"What travels the world staying in a corner?",o:["Stamp","Phone","Wind","Light"],a:"Stamp"},
{q:"What has 28 days?",o:["All","February","None","June"],a:"All"},
{q:"Full of holes but holds water?",o:["Sponge","Cup","Bucket","Net"],a:"Sponge"}
];

let riddles = [...originalRiddles];

let score = 0;
let time = 30;
let current;
let timer;

let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText = highScore;

// TIMER
function startTimer(){
    timer = setInterval(() => {
        time--;

        document.getElementById("time").innerText = time;
        document.getElementById("fuseFill").style.width = (time/30*100)+"%";

        if(time <= 0){
            clearInterval(timer);
            gameOver(false);
        }
    }, 1000);
}

// LOAD RIDDLE (no repeat)
function loadRiddle(){
    if(riddles.length === 0){
        riddles = [...originalRiddles];
    }

    const i = Math.floor(Math.random()*riddles.length);
    current = riddles.splice(i,1)[0];

    document.getElementById("riddleText").innerText = current.q;
    document.getElementById("feedback").innerText = "";

    const box = document.getElementById("options");
    box.innerHTML = "";

    current.o.forEach(opt => {
        const b = document.createElement("button");
        b.className = "option";
        b.innerText = opt;
        b.onclick = () => answer(opt);
        box.appendChild(b);
    });
}

// ANSWER FUNCTION (FIXED FLOW)
function answer(choice){
    if(choice === current.a){
        score++;
        document.getElementById("feedback").innerText = "✅ Correct";
    } else {
        score -= 0.5;
        document.getElementById("feedback").innerText = "❌ Wrong";
    }

    document.getElementById("score").innerText = score.toFixed(1);

    if(score >= 3){
        gameOver(true);
        return;
    }

    // load next riddle AFTER short delay
    setTimeout(loadRiddle, 800);
}

// GAME OVER
function gameOver(win){
    clearInterval(timer);

    if(score > highScore){
        localStorage.setItem("highScore", score);
    }

    document.getElementById("gameOverText").innerText =
        win ? "🎉 YOU DEFUSED THE BOMB 🎉"
            : "💥 YOU BLEW UP 💀";

    document.getElementById("gameOver").style.display = "flex";
}

// START GAME
startTimer();
loadRiddle();

</script>

</body>
</html>
